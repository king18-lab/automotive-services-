<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Stackly Automotive | 404 - Page Not Found</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* 404 HERO SECTION WITH VIDEO */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }
    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      z-index: -1;
    }
    .hero-content {
      max-width: 900px;
      color: white;
      padding: 2rem;
      position: relative;
      z-index: 2;
      animation: fadeInUp 0.8s ease;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #d6f736, #a0c020);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(214, 247, 54, 0.3);
      letter-spacing: 5px;
      margin-bottom: 1rem;
      line-height: 1;
    }
    .hero-content h2 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .hero-content p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.9;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      color: #ddd;
    }
    .button-group {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-404 {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 0.9rem 2rem;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      border: none;
      font-family: inherit;
    }
    .btn-home {
      background: #d6f736;
      color: #000;
      box-shadow: 0 5px 15px rgba(214, 247, 54, 0.3);
    }
    .btn-home:hover {
      background: #eaff6e;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(214, 247, 54, 0.5);
    }
    .btn-prev {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(5px);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }
    .btn-prev:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-3px);
      border-color: #d6f736;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<main>
  <!-- 404 Hero Section with Background Video -->
  <section class="hero">
    <video class="hero-video" autoplay muted loop playsinline poster="maxdrive1.webp">
      <source src="" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="error-code">404</div>
      <h2>Road Not Found</h2>
      <p>Looks like you've taken a wrong turn. Let's get you back on the main highway.</p>
      <div class="button-group">
        <!-- Back to Home button -->
        <a href="index.html" class="btn-404 btn-home"><i class="fas fa-home"></i> Back to Home</a>
        <!-- Previous Page button -->
        <button class="btn-404 btn-prev" id="prevPageBtn"><i class="fas fa-arrow-left"></i> Previous Page</button>
      </div>
    </div>
  </section>
</main>

<script>
  (function() {
    // Previous Page button functionality
    const prevPageBtn = document.getElementById('prevPageBtn');
    if (prevPageBtn) {
      prevPageBtn.addEventListener('click', () => {
        window.history.back();
      });
    }
  })();
</script>
</body>
</html>
